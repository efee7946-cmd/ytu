<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTÜ Time - En İyi Tweet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0a1628;--navy2:#0e1f3d;--gold:#c9962a;--gold2:#f0bf5a;--gold3:#ffd97d;--muted:#8899bb;}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-title{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:.08em;
      background:linear-gradient(135deg,#f0bf5a,#ffd97d);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-links{display:flex;gap:4px;list-style:none}
    .nav-links a{text-decoration:none;color:#8899bb;font-size:.82rem;font-weight:700;
      padding:6px 12px;border-radius:8px;border:1.5px solid transparent;transition:all .2s;
      display:flex;align-items:center;gap:5px}
    .nav-links a:hover{color:#e8ecf4;background:#162845;border-color:rgba(201,150,42,.3)}
    .nav-links a.active{color:#f0bf5a;border-color:rgba(201,150,42,.4);background:rgba(201,150,42,.08)}
    @media(max-width:640px){.nav-links{display:none}}
  </style>
</head>

<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center">

  <nav style="position:sticky;top:0;z-index:200;background:rgba(10,22,40,.94);backdrop-filter:blur(16px);border-bottom:2px solid rgba(201,150,42,.3);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:1rem;">
    <a href="home.html" onclick="return confirmExit(event)" class="nav-brand">
      <span style="font-size:1.5rem">⭐</span>
      <span class="nav-title">YILDIZ SEÇİYOR</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html" onclick="return confirmExit(event)">🏠 Ana Sayfa</a></li>
      <li><a href="index.html" class="active">🗳️ Oylama</a></li>
      <li><a href="map.html" onclick="return confirmExit(event)">🗺️ Harita</a></li>
    </ul>
  </nav>

  <p id="round-name" class="text-slate-400 mt-2 text-sm md:text-base">Son 16</p>
  <p class="text-white mt-1 text-xs md:text-sm">👆 Beğendiğin tweete tıkla!</p>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8 max-w-4xl w-full mx-auto mt-4 md:mt-6 px-4">
    <div id="cardA" class="cursor-pointer hover:scale-105 active:scale-95 hover:border-yellow-400 border-4 border-transparent rounded-xl transition select-none">
      <img id="imgA" class="rounded-xl w-full">
    </div>
    <div id="cardB" class="cursor-pointer hover:scale-105 active:scale-95 hover:border-yellow-400 border-4 border-transparent rounded-xl transition select-none">
      <img id="imgB" class="rounded-xl w-full">
    </div>
  </div>

  <p id="status" class="text-slate-400 mt-4 text-sm mb-10"></p>

  <script src="js/exit.js"></script>
  <script type="module" src="js/app.js"></script>

  <!-- Çıkış Uyarısı Modal -->
  <div id="exitModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 px-4">
    <div class="bg-slate-800 border-4 border-yellow-400 rounded-2xl p-8 max-w-sm w-full text-center">
      <p class="text-2xl mb-2">⚠️</p>
      <h2 class="text-xl font-bold text-white mb-2">Emin misin?</h2>
      <p class="text-slate-400 text-sm mb-6">Oyun yarıda kalacak ve ilerleme kaybolacak.</p>
      <div class="flex gap-4">
        <button onclick="closeModal()" class="flex-1 py-3 rounded-xl border-2 border-slate-500 text-slate-300 hover:border-yellow-400 hover:text-yellow-400 transition font-bold">
          Devam Et
        </button>
        <button onclick="goHome()" class="flex-1 py-3 rounded-xl bg-yellow-400 hover:bg-yellow-300 text-slate-900 transition font-bold">
          Çık
        </button>
      </div>
    </div>
  </div>

  <canvas id="stars" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
<script>
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  let W, H, bgStars = [], shooters = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    bgStars = [];
    for (let i = 0; i < 120; i++) {
      bgStars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.3,
        alpha: Math.random() * 0.5 + 0.2,
        twinkleSpeed: Math.random() * 0.015 + 0.005,
        twinkleDir: Math.random() > 0.5 ? 1 : -1
      });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);

    for (let s of bgStars) {
      s.alpha += s.twinkleSpeed * s.twinkleDir;
      if (s.alpha > 0.75) { s.alpha = 0.75; s.twinkleDir = -1; }
      if (s.alpha < 0.1)  { s.alpha = 0.1;  s.twinkleDir =  1; }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${s.alpha})`;
      ctx.fill();
    }

    for (let i = shooters.length - 1; i >= 0; i--) {
      const s = shooters[i];
      const speed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
      const tailX = s.x - s.vx * (s.len / speed);
      const tailY = s.y - s.vy * (s.len / speed);
      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, `rgba(255,255,255,0)`);
      grad.addColorStop(1, `rgba(255,255,255,${s.alpha * 0.8})`);
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
      ctx.fill();
      s.x += s.vx; s.y += s.vy; s.alpha -= s.fade;
      if (s.alpha <= 0 || s.x > W + 100 || s.y > H + 100) shooters.splice(i, 1);
    }

    if (Math.random() < 0.011) {
      const angle = (Math.random() * 20 + 10) * Math.PI / 180;
      const speed = Math.random() * 4 + 3;
      shooters.push({
        x: Math.random() * W * 0.7,
        y: Math.random() * H * 0.4,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        len: Math.random() * 80 + 60,
        alpha: 1,
        fade: Math.random() * 0.012 + 0.008
      });
    }

    requestAnimationFrame(animate);
  }

  resize();
  animate();
  window.addEventListener("resize", resize);
</script>
</body>

</html>
