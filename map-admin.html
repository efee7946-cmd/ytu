<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Harita Fotoğrafları</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0a1628;--navy2:#0e1f3d;--navy3:#162845;
      --gold:#c9962a;--gold2:#f0bf5a;--gold3:#ffd97d;
      --text:#e8ecf4;--muted:#8899bb;--green:#3aaa55;--red:#e85858}
    body{background:var(--navy);color:var(--text);font-family:"Nunito",sans-serif;min-height:100vh}

    /* LOGIN */
    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:var(--navy2);border:2px solid rgba(201,150,42,.3);border-radius:20px;
      padding:40px 36px;width:100%;max-width:360px;text-align:center}
    .login-card .big-icon{font-size:2.8rem;margin-bottom:14px}
    .login-card h1{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:.07em;margin-bottom:6px;
      background:linear-gradient(135deg,#fff,var(--gold2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .login-card p{color:var(--muted);font-size:.85rem;margin-bottom:26px}
    .form-group{margin-bottom:14px;text-align:left}
    .form-group label{display:block;font-size:.7rem;font-weight:700;color:var(--muted);
      letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
    .form-input{width:100%;background:var(--navy3);border:1.5px solid rgba(255,255,255,.1);
      border-radius:10px;padding:10px 14px;color:var(--text);font-family:"Nunito",sans-serif;
      font-size:.9rem;outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--gold2)}
    .btn-login{width:100%;margin-top:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:var(--navy);font-family:"Nunito",sans-serif;font-weight:900;font-size:.95rem;
      padding:12px;border-radius:999px;border:none;cursor:pointer;transition:all .2s;
      box-shadow:0 4px 20px rgba(201,150,42,.3)}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,150,42,.5)}
    .login-err{margin-top:12px;padding:8px 14px;background:rgba(232,88,88,.15);color:var(--red);
      border-radius:8px;font-size:.82rem;display:none}

    /* PANEL */
    .admin-panel{display:none}
    nav{position:sticky;top:0;z-index:100;background:rgba(10,22,40,.94);backdrop-filter:blur(16px);
      border-bottom:2px solid rgba(201,150,42,.3);padding:0 24px;height:60px;
      display:flex;align-items:center;justify-content:space-between}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);object-fit:cover}
    .nav-title{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:.07em;
      background:linear-gradient(135deg,var(--gold2),var(--gold3));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-right{display:flex;align-items:center;gap:10px}
    .badge{background:rgba(232,88,88,.2);border:1.5px solid rgba(232,88,88,.4);border-radius:999px;
      padding:3px 12px;font-family:"JetBrains Mono",monospace;font-size:.72rem;color:var(--red)}
    .btn-sm{background:transparent;border:1.5px solid rgba(255,255,255,.1);border-radius:8px;
      color:var(--muted);font-size:.78rem;font-weight:700;padding:5px 12px;cursor:pointer;transition:all .2s}
    .btn-sm:hover{color:var(--text);border-color:rgba(255,255,255,.25)}

    main{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
    .stat-card{background:var(--navy2);border:1.5px solid rgba(255,255,255,.07);border-radius:12px;padding:16px}
    .stat-label{font-family:"JetBrains Mono",monospace;font-size:.65rem;color:var(--muted);
      letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
    .stat-val{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:.04em;
      background:linear-gradient(135deg,var(--gold2),var(--gold3));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* TABS */
    .tabs{display:flex;gap:6px;margin-bottom:20px}
    .tab-btn{background:var(--navy2);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;
      padding:8px 18px;font-size:.85rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
    .tab-btn:hover{color:var(--text);border-color:rgba(201,150,42,.3)}
    .tab-btn.active{background:rgba(201,150,42,.1);color:var(--gold2);border-color:rgba(201,150,42,.4)}

    /* GRID */
    .photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .photo-card{background:var(--navy2);border:1.5px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;transition:border-color .2s}
    .photo-card:hover{border-color:rgba(201,150,42,.3)}
    .photo-card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;cursor:zoom-in}
    .photo-meta{padding:12px 14px}
    .photo-zone{font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:.05em;color:var(--gold2);margin-bottom:4px}
    .photo-info{font-size:.76rem;color:var(--muted);margin-bottom:10px;line-height:1.6}
    .photo-info strong{color:var(--text)}
    .photo-actions{display:flex;gap:8px}
    .btn-approve{flex:1;background:rgba(58,170,85,.15);border:1.5px solid rgba(58,170,85,.4);
      border-radius:8px;color:var(--green);font-weight:800;font-size:.82rem;padding:8px;cursor:pointer;transition:all .2s}
    .btn-approve:hover{background:rgba(58,170,85,.28)}
    .btn-reject{flex:1;background:rgba(232,88,88,.12);border:1.5px solid rgba(232,88,88,.3);
      border-radius:8px;color:var(--red);font-weight:800;font-size:.82rem;padding:8px;cursor:pointer;transition:all .2s}
    .btn-reject:hover{background:rgba(232,88,88,.25)}

    .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .big{font-size:2.5rem;margin-bottom:10px;display:block}
    .loading-state{grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);font-size:.9rem}
    .spinner{width:26px;height:26px;border:2.5px solid rgba(255,255,255,.08);
      border-top-color:var(--gold2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.93);
      display:flex;align-items:center;justify-content:center;padding:20px;
      opacity:0;pointer-events:none;transition:opacity .3s}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox img{max-width:100%;max-height:90vh;border-radius:12px;
      border:2px solid rgba(201,150,42,.4);transform:scale(.92);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
    .lightbox.open img{transform:scale(1)}
    .lb-close{position:absolute;top:20px;right:20px;width:38px;height:38px;border-radius:50%;
      background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
      color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--navy2);border:1.5px solid rgba(201,150,42,.4);border-radius:10px;
      padding:11px 18px;font-size:.83rem;font-weight:700;color:var(--text);
      z-index:9999;transition:transform .35s cubic-bezier(.34,1.3,.64,1);white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}

    @media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.photos-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="big-icon">🔐</div>
    <h1>ADMİN PANELİ</h1>
    <p>Harita fotoğraflarını yönet</p>
    <div class="form-group">
      <label>Şifre</label>
      <input class="form-input" type="password" id="pwInput" placeholder="Admin şifresi...">
    </div>
    <button class="btn-login" id="btnLogin">Giriş Yap</button>
    <div class="login-err" id="loginErr">❌ Yanlış şifre!</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB={
  apiKey:"AIzaSyABb9qD1kBcCCNZF6y-izEI49eml5laQsk",
  authDomain:"ytut-fc618.firebaseapp.com",
  projectId:"ytut-fc618",
  storageBucket:"ytut-fc618.firebasestorage.app",
  messagingSenderId:"379744876322",
  appId:"1:379744876322:web:73a1396302b9bed6a6977b"
};
const fbApp=initializeApp(FB);
const db=getFirestore(fbApp);

// Şifre SHA-256 ile hashlenmiş; kaynak kodda düz metin görünmez.
// Yeni şifre için: Node'da require('crypto').createHash('sha256').update('yeniŞifre').digest('hex')
const ADMIN_HASH="7b3c3094924db7b01c19559c98161c2bae5fdf8d2215268b3972dd5767203107";

let currentTab="pending", allPhotos=[];

document.getElementById("btnLogin").addEventListener("click",tryLogin);
document.getElementById("pwInput").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()});

async function tryLogin(){
  const input=document.getElementById("pwInput").value;
  const buf=new TextEncoder().encode(input);
  const hashBuf=await crypto.subtle.digest("SHA-256",buf);
  const hashHex=Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  if(hashHex===ADMIN_HASH){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("loginErr").style.display="none";
    loadPhotos();
  } else {
    document.getElementById("loginErr").style.display="block";
    document.getElementById("pwInput").value="";
    document.getElementById("pwInput").focus();
  }
}

document.getElementById("btnLogout").addEventListener("click",()=>location.reload());
document.getElementById("btnRefresh").addEventListener("click",loadPhotos);

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); currentTab=btn.dataset.tab; renderGrid();
  });
});

async function loadPhotos(){
  document.getElementById("photosGrid").innerHTML=
    `<div class="loading-state"><div class="spinner"></div>Yükleniyor...</div>`;
  try{
    const snap=await getDocs(query(collection(db,"mapPhotos"),orderBy("createdAt","desc")));
    allPhotos=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateStats(); renderGrid();
  }catch(e){
    document.getElementById("photosGrid").innerHTML=
      `<div class="empty-state"><span class="big">❌</span>Hata: ${e.message}</div>`;
  }
}

function updateStats(){
  const approved=allPhotos.filter(p=>p.approved===true).length;
  const rejected=allPhotos.filter(p=>p.approved===false&&p.rejectedAt).length;
  const pending=allPhotos.filter(p=>p.approved===false&&!p.rejectedAt).length;
  document.getElementById("sTotal").textContent=allPhotos.length;
  document.getElementById("sApproved").textContent=approved;
  document.getElementById("sPending").textContent=pending;
  document.getElementById("sRejected").textContent=rejected;
  document.getElementById("pendingBadge").textContent=pending+" bekliyor";
}

function renderGrid(){
  const grid=document.getElementById("photosGrid");
  grid.innerHTML="";
  let filtered;
  if(currentTab==="pending")  filtered=allPhotos.filter(p=>p.approved===false&&!p.rejectedAt);
  if(currentTab==="approved") filtered=allPhotos.filter(p=>p.approved===true);
  if(currentTab==="rejected") filtered=allPhotos.filter(p=>p.approved===false&&p.rejectedAt);

  if(!filtered||filtered.length===0){
    const msgs={pending:"🎉 Bekleyen fotoğraf yok!",approved:"Henüz onaylanan yok.",rejected:"Reddedilen yok."};
    grid.innerHTML=`<div class="empty-state"><span class="big">📭</span>${msgs[currentTab]}</div>`;
    return;
  }

  filtered.forEach(p=>{
    const date=p.createdAt?.toDate?.()
      ?p.createdAt.toDate().toLocaleDateString("tr-TR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})
      :"—";
    const card=document.createElement("div");
    card.className="photo-card"; card.id="card-"+p.id;
    card.innerHTML=`
      <img src="${p.url}" alt="" loading="lazy">
      <div class="photo-meta">
        <div class="photo-zone">${p.zoneName||p.zoneId}</div>
        <div class="photo-info">
          <strong>👤 ${p.uploader||"Anonim"}</strong><br>
          ${p.desc?`💬 ${p.desc}<br>`:""}
          📅 ${date}
        </div>
        <div class="photo-actions">
          ${currentTab==="pending"?`
            <button class="btn-approve" data-id="${p.id}">✅ Onayla</button>
            <button class="btn-reject"  data-id="${p.id}">❌ Reddet</button>`
          :currentTab==="approved"?`
            <button class="btn-reject" data-id="${p.id}" style="flex:1">🗑️ Kaldır</button>`
          :`<button class="btn-approve" data-id="${p.id}" style="flex:1">↩️ Geri Al</button>`}
        </div>
      </div>`;
    card.querySelector("img").addEventListener("click",()=>{
      document.getElementById("lbImg").src=p.url;
      document.getElementById("lightbox").classList.add("open");
    });
    grid.appendChild(card);
  });

  grid.addEventListener("click",async e=>{
    const a=e.target.closest(".btn-approve");
    const r=e.target.closest(".btn-reject");
    if(a) await doApprove(a.dataset.id);
    if(r) await doReject(r.dataset.id);
  },{once:true});
}

async function doApprove(id){
  try{
    await updateDoc(doc(db,"mapPhotos",id),{approved:true,rejectedAt:null});
    const p=allPhotos.find(x=>x.id===id);
    if(p){p.approved=true;p.rejectedAt=null}
    updateStats(); renderGrid(); showToast("✅ Onaylandı, haritada yayında!");
  }catch(e){showToast("❌ Hata: "+e.message)}
}

async function doReject(id){
  if(!confirm("Bu fotoğrafı reddet/kaldır?")) return;
  try{
    await updateDoc(doc(db,"mapPhotos",id),{approved:false,rejectedAt:new Date()});
    const p=allPhotos.find(x=>x.id===id);
    if(p){p.approved=false;p.rejectedAt=new Date()}
    updateStats(); renderGrid(); showToast("🗑️ Kaldırıldı.");
  }catch(e){showToast("❌ Hata: "+e.message)}
}

document.getElementById("lbClose").addEventListener("click",()=>document.getElementById("lightbox").classList.remove("open"));
document.getElementById("lightbox").addEventListener("click",e=>{
  if(e.target===document.getElementById("lightbox")) document.getElementById("lightbox").classList.remove("open");
});

function showToast(msg){
  const t=document.getElementById("toast"); t.textContent=msg;
  t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3500);
}
</script>
</body>
</html>
